{% extends "base.html" %}
{% block title %}Chat — SRA{% endblock %}
{% block extra_css %}<link href="{{ url_for('static', filename='css/chat.css') }}" rel="stylesheet"/>{% endblock %}

{% block content %}
<div class="chat-layout">
  <!-- Rooms sidebar -->
  <aside class="chat-sidebar">
    <div class="chat-sidebar-header">
      <h2 class="fs-6 fw-bold mb-0">Messages</h2>
      <button class="nav-icon-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
    </div>
    <div class="chat-search p-3 border-bottom">
      <div class="input-group input-group-sm">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" placeholder="Search rooms…" id="room-search" oninput="filterRooms(this.value)"/>
      </div>
    </div>
    <div class="room-list" id="room-list">
      <!-- Current room highlighted -->
      <div class="room-item active" id="current-room-item">
        <div class="room-avatar"><i class="bi bi-chat-dots"></i></div>
        <div class="room-info">
          <div class="room-name fw-medium" id="room-display-name">{{ room_id }}</div>
          <div class="room-preview text-muted small">Loading…</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Chat window -->
  <div class="chat-window">
    <!-- Chat header -->
    <div class="chat-header">
      <div class="d-flex align-items-center gap-3">
        <div class="chat-header-avatar"><i class="bi bi-chat-dots"></i></div>
        <div>
          <div class="fw-semibold" id="chat-header-name">{{ room_id }}</div>
          <div class="small text-muted" id="chat-header-status">
            <span class="status-dot online"></span> Connected
          </div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="nav-icon-btn" title="Map" onclick="window.location.href='/map'">
          <i class="bi bi-map"></i>
        </button>
        <button class="nav-icon-btn" title="Info" id="info-btn">
          <i class="bi bi-info-circle"></i>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messages-area">
      <div class="text-center py-5">
        <div class="spinner-border spinner-border-sm text-primary mb-2"></div>
        <p class="text-muted small">Loading messages…</p>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator d-none" id="typing-indicator">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>

    <!-- Input bar -->
    <div class="chat-input-bar">
      <div class="input-group">
        <textarea
          class="form-control chat-input"
          id="msg-input"
          placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button class="btn btn-primary send-btn" id="send-btn" onclick="sendMessage()">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Live tracker panel (for admin/task rooms) -->
  <div class="tracker-panel d-none" id="tracker-panel">
    <div class="tracker-header">
      <span class="fw-semibold">Live Tracker</span>
      <button class="btn-close btn-close-sm" onclick="document.getElementById('tracker-panel').classList.add('d-none')"></button>
    </div>
    <div id="tracker-map" style="height:240px;border-radius:8px;overflow:hidden;"></div>
    <div class="tracker-info mt-2">
      <div class="small text-muted">Volunteer last seen:</div>
      <div class="fw-medium" id="tracker-last-seen">—</div>
    </div>
  </div>
</div>

<script>
  const ROOM_ID = "{{ room_id }}";
</script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
