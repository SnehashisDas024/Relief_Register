<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Smart Resource Allocation{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Leaflet CSS -->
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
  <!-- SRA global styles -->
  <link href="{{ url_for('static', filename='css/base.css') }}" rel="stylesheet"/>
  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Navbar (hidden on auth pages) -->
<nav class="sra-navbar" id="main-navbar" style="display:none">
  <div class="nav-inner">
    <div class="nav-left">
      <button class="nav-toggle d-lg-none" id="sidebar-toggle" aria-label="Menu">
        <i class="bi bi-list text-xl"></i>
      </button>
      <a href="/" class="nav-brand">
        <i class="bi bi-geo-alt-fill text-primary"></i>
        <span class="d-none d-sm-inline fw-bold">Smart Resource Allocation</span>
        <span class="d-sm-none fw-bold">SRA</span>
      </a>
    </div>
    <div class="nav-right">
      <!-- Notifications -->
      <div class="nav-notif-wrapper position-relative" id="notif-wrapper" style="display:none">
        <button class="nav-icon-btn" id="notif-btn" aria-label="Notifications">
          <i class="bi bi-bell"></i>
          <span class="notif-badge" id="notif-badge" style="display:none">0</span>
        </button>
        <div class="notif-dropdown" id="notif-dropdown" style="display:none">
          <div class="notif-header">Notifications</div>
          <div id="notif-list"><p class="text-center text-muted py-3 small">No notifications</p></div>
        </div>
      </div>
      <!-- Dark mode -->
      <button class="nav-icon-btn" id="theme-toggle" aria-label="Toggle dark mode">
        <i class="bi bi-moon-stars" id="theme-icon"></i>
      </button>
      <!-- User menu -->
      <div class="nav-user-wrapper position-relative" id="user-menu-wrapper" style="display:none">
        <button class="nav-user-btn" id="user-menu-btn">
          <span class="user-avatar" id="user-avatar">U</span>
          <span class="d-none d-sm-inline" id="nav-username">User</span>
          <i class="bi bi-chevron-down small"></i>
        </button>
        <div class="user-dropdown" id="user-dropdown" style="display:none">
          <div class="user-dropdown-header">
            <div class="fw-semibold" id="dd-name">User</div>
            <div class="text-muted small" id="dd-role">user</div>
          </div>
          <hr class="my-1"/>
          <button class="dropdown-item" onclick="SRA.logout()">
            <i class="bi bi-box-arrow-right me-2"></i>Sign Out
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Page content -->
<main id="page-content">
  {% block content %}{% endblock %}
</main>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
