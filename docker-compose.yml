version: "3.9"

# ── Local development stack ───────────────────────────────────────────────────
# Starts: PostgreSQL, Redis, Flask web server, Celery worker, Celery beat.
# Requirements: Docker + Docker Compose installed.
# Usage:
#   docker compose up --build
#   Open http://localhost:5000 for the Flask/Jinja2 UI
#   Open http://localhost:5173 for the Vite dev server (React)

services:

  # ── PostgreSQL ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sra
      POSTGRES_PASSWORD: sra_dev_password
      POSTGRES_DB: sra_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sra"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Flask web server ──────────────────────────────────────────────
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn --worker-class eventlet -w 1 run:app --bind 0.0.0.0:5000 --reload
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://sra:sra_dev_password@db:5432/sra_dev
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: local-dev-secret-key-change-me
      JWT_SECRET_KEY: local-dev-jwt-key-change-me
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker ─────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_worker.celery worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://sra:sra_dev_password@db:5432/sra_dev
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: local-dev-secret-key-change-me
      JWT_SECRET_KEY: local-dev-jwt-key-change-me
    depends_on:
      - db
      - redis

  # ── Celery beat (periodic tasks) ──────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_worker.celery beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://sra:sra_dev_password@db:5432/sra_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  pg_data:
